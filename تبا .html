<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>RABI3 AI PRO | الذكاء الخارق</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(145deg, #0d1117 0%, #0a0e13 100%);
  font-family: 'Cairo', sans-serif;
  color: #e8edf5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ========== الهيدر ========== */
.app-header {
  background: rgba(13, 17, 23, 0.95);
  backdrop-filter: blur(10px);
  padding: 12px 20px;
  border-bottom: 1px solid rgba(88, 166, 255, 0.15);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, #58a6ff, #3b82f6);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}
.logo-text {
  font-weight: 700;
  font-size: 1.2rem;
  background: linear-gradient(135deg, #fff, #58a6ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.model-selector {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(88,166,255,0.2);
  border-radius: 30px;
  padding: 8px 15px;
  color: #58a6ff;
  font-size: 0.75rem;
  outline: none;
  cursor: pointer;
  font-family: monospace;
  width: 220px;
}
.api-key-area {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.api-input {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(88,166,255,0.2);
  border-radius: 30px;
  padding: 8px 15px;
  color: #e8edf5;
  font-size: 0.75rem;
  width: 220px;
  outline: none;
  direction: ltr;
}
.api-input::placeholder { color: #5c6b7a; }

/* صورة دائرية صغيرة جنب الروابط */
.social-area {
  display: flex;
  align-items: center;
  gap: 12px;
}
.small-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid #58a6ff;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(88,166,255,0.5);
}
.small-avatar img { width: 100%; height: 100%; object-fit: cover; }
.social-icons {
  display: flex;
  gap: 10px;
}
.social-icons a {
  color: #8b9bb0;
  font-size: 1.2rem;
  transition: 0.2s;
}
.social-icons a:hover { color: #58a6ff; transform: translateY(-2px); }

/* ========== وضع سريع - خيارات ========== */
.mode-section {
  padding: 15px 20px 5px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}
.mode-btn {
  padding: 8px 24px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  background: rgba(22,28,36,0.8);
  border: 1px solid rgba(88,166,255,0.15);
  color: #8b9bb0;
}
.mode-btn.active {
  background: linear-gradient(135deg, #58a6ff, #3b82f6);
  color: white;
  box-shadow: 0 2px 10px rgba(88,166,255,0.3);
}
.clear-history-btn {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: #ef4444;
}
.clear-history-btn:hover { background: rgba(239,68,68,0.25); }

/* ========== منطقة المحادثة ========== */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
  padding: 20px;
}
.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 10px 5px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 400px;
  max-height: calc(100vh - 300px);
}
.messages-container::-webkit-scrollbar { width: 5px; }
.messages-container::-webkit-scrollbar-track { background: #161c24; border-radius: 5px; }
.messages-container::-webkit-scrollbar-thumb { background: #58a6ff; border-radius: 5px; }

/* الرسائل */
.message {
  display: flex;
  gap: 12px;
  max-width: 85%;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #1e2a36;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.message.user .message-avatar { background: linear-gradient(135deg, #58a6ff, #3b82f6); }
.message-content {
  background: #161c24;
  padding: 10px 16px;
  border-radius: 18px;
  font-size: 0.9rem;
  line-height: 1.6;
  position: relative;
}
.message.user .message-content {
  background: linear-gradient(135deg, #1a2a3a, #0f1a24);
  border-right: 2px solid #58a6ff;
}
.copy-msg {
  position: absolute;
  bottom: -8px;
  right: 12px;
  background: #0d1117;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 0.55rem;
  cursor: pointer;
  color: #8b9bb0;
  opacity: 0;
  transition: 0.2s;
}
.message:hover .copy-msg { opacity: 1; }
.copy-msg:hover { color: #58a6ff; }
.message.user .copy-msg { right: auto; left: 12px; }

/* الملفات والصور */
.file-attachment {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(88,166,255,0.1);
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  margin-top: 8px;
}
.msg-image {
  max-width: 200px;
  border-radius: 12px;
  margin-top: 8px;
  border: 1px solid #58a6ff;
  cursor: pointer;
}

/* ========== منطقة الإدخال ========== */
.input-section {
  background: #161c24;
  border-radius: 30px;
  padding: 8px 15px;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid rgba(88,166,255,0.2);
  margin-top: 10px;
}
.input-section input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 12px 5px;
  color: #e8edf5;
  font-size: 0.9rem;
  outline: none;
}
.input-section input::placeholder { color: #5c6b7a; }
.file-btn, .voice-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: rgba(88,166,255,0.1);
  border: none;
  color: #58a6ff;
  cursor: pointer;
  font-size: 1rem;
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.file-btn:hover, .voice-btn:hover { background: rgba(88,166,255,0.2); transform: scale(1.05); }
#fileInput { display: none; }
.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #58a6ff, #3b82f6);
  border: none;
  color: white;
  cursor: pointer;
  font-size: 1rem;
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 0 12px #58a6ff; }

/* مؤشر الكتابة */
.typing-ind {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  background: #161c24;
  border-radius: 20px;
  width: fit-content;
}
.typing-ind span {
  width: 6px; height: 6px;
  background: #58a6ff;
  border-radius: 50%;
  animation: typingAnim 1s infinite;
}
.typing-ind span:nth-child(2){animation-delay:.2s}
.typing-ind span:nth-child(3){animation-delay:.4s}
@keyframes typingAnim { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

/* سجل المحادثات */
.history-panel {
  position: fixed;
  right: -350px;
  top: 0;
  width: 350px;
  height: 100%;
  background: rgba(13,17,23,0.98);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(88,166,255,0.3);
  z-index: 200;
  transition: 0.3s;
  padding: 20px;
  overflow-y: auto;
}
.history-panel.open { right: 0; }
.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(88,166,255,0.2);
}
.history-header h3 { color: #58a6ff; font-size: 1rem; }
.history-item {
  background: #161c24;
  padding: 12px 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
  border-left: 2px solid #58a6ff;
}
.history-item:hover { background: #1e2a36; transform: translateX(-5px); }
.history-btn {
  position: fixed;
  right: 15px;
  bottom: 100px;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #161c24;
  border: 1px solid #58a6ff;
  color: #58a6ff;
  cursor: pointer;
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: 0.2s;
}
.history-btn:hover { background: #58a6ff; color: #0d1117; }

.recording-badge {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #ef4444;
  color: white;
  padding: 6px 16px;
  border-radius: 30px;
  font-size: 0.7rem;
  display: none;
  z-index: 200;
  animation: pulseRed 1s infinite;
}
@keyframes pulseRed { 0%,100%{opacity:0.8} 50%{opacity:1} }

footer {
  text-align: center;
  padding: 12px;
  font-size: 0.6rem;
  color: #5c6b7a;
}

@media(max-width:650px){
  .mode-btn { padding: 6px 12px; font-size: 0.7rem; }
  .api-input { width: 140px; }
  .model-selector { width: 160px; }
  .message { max-width: 95%; }
  .history-panel { width: 280px; }
}
</style>
</head>

<script>
// ========== إعدادات API ==========
const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";

// قائمة النماذج الكاملة (تم إضافتها في الـ HTML)
let conversationHistory = [];
let allConversations = [];
let currentMode = 'fast';
let isWaiting = false;
let currentController = null;

// تحميل المحادثات السابقة
try {
    const saved = localStorage.getItem('rabi3_conversations');
    if(saved) allConversations = JSON.parse(saved);
    const savedHistory = localStorage.getItem('rabi3_current_history');
    if(savedHistory) conversationHistory = JSON.parse(savedHistory);
} catch(e) {}

// أوضاع المحادثة
const modePrompts = {
  fast: { name: 'سريع', prompt: 'أجب بسرعة واختصار. كن مباشراً ومفيداً.', temp: 0.5, icon: '⚡' },
  expert: { name: 'خبير', prompt: 'أجب بتفصيل واحترافية عالية. كن خبيراً في مجالك.', temp: 0.7, icon: '🎓' },
  creative: { name: 'إبداعي', prompt: 'أجب بإبداع وابتكار. استخدم أمثلة وتشبيهات جميلة.', temp: 0.9, icon: '🎨' },
  coding: { name: 'مبرمج', prompt: 'أجب كخبير برمجة. قدم كود نظيف مع شرح.', temp: 0.6, icon: '💻' }
};

// ========== عناصر الواجهة ==========
const messagesContainer = document.getElementById('messagesContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const voiceBtn = document.getElementById('voiceBtn');
const fileBtn = document.getElementById('fileBtn');
const fileInput = document.getElementById('fileInput');
const apiKeyInput = document.getElementById('apiKeyInput');
const modelSelect = document.getElementById('modelSelect');
const historyBtn = document.getElementById('historyBtn');
const historyPanel = document.getElementById('historyPanel');
const closeHistory = document.getElementById('closeHistory');
const historyList = document.getElementById('historyList');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');
const recordingBadge = document.getElementById('recordingBadge');

// حفظ آخر نموذج مستخدم
const lastModel = localStorage.getItem('rabi3_last_model');
if(lastModel) modelSelect.value = lastModel;
modelSelect.addEventListener('change', () => {
    localStorage.setItem('rabi3_last_model', modelSelect.value);
});

// ========== دوال الواجهة ==========
function addMessage(text, isUser = false, imageUrl = null, fileName = null) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${isUser ? 'user' : ''}`;
    let content = text.replace(/\n/g, '<br>');
    if (imageUrl) {
        content += `<br><img src="${imageUrl}" class="msg-image" onclick="window.open(this.src)">`;
    }
    if (fileName) {
        content += `<br><div class="file-attachment"><i class="fas fa-file"></i> ${fileName}</div>`;
    }
    msgDiv.innerHTML = `
        <div class="message-avatar">${isUser ? '👤' : modePrompts[currentMode]?.icon || '🤖'}</div>
        <div class="message-content">${content}<span class="copy-msg">📋 نسخ</span></div>
    `;
    messagesContainer.appendChild(msgDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    
    const copyBtn = msgDiv.querySelector('.copy-msg');
    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(text);
        copyBtn.textContent = '✅';
        setTimeout(() => { copyBtn.textContent = '📋 نسخ'; }, 1500);
    });
    return msgDiv;
}

function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing-ind';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = '<span></span><span></span><span></span><span style="margin-left:5px;">جاري التفكير...</span>';
    messagesContainer.appendChild(typingDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function saveConversation() {
    if (conversationHistory.length === 0) return;
    const title = conversationHistory[0]?.content?.substring(0, 45) || 'محادثة جديدة';
    allConversations.unshift({
        id: Date.now(),
        title: title,
        history: JSON.parse(JSON.stringify(conversationHistory)),
        date: new Date().toLocaleString(),
        mode: currentMode,
        model: modelSelect.value
    });
    if (allConversations.length > 30) allConversations.pop();
    localStorage.setItem('rabi3_conversations', JSON.stringify(allConversations));
    updateHistoryList();
}

function updateHistoryList() {
    if (allConversations.length === 0) {
        historyList.innerHTML = '<div style="color:#5c6b7a; text-align:center; padding:20px;">لا توجد محادثات سابقة</div>';
        return;
    }
    historyList.innerHTML = allConversations.map(conv => `
        <div class="history-item" onclick="loadConversation(${conv.id})">
            <div style="font-weight:bold; margin-bottom:4px;">💬 ${conv.title.substring(0, 35)}</div>
            <div style="display:flex; justify-content:space-between; font-size:0.6rem;">
                <span style="color:#58a6ff;">${conv.date}</span>
                <span style="color:#8b9bb0;">${modePrompts[conv.mode]?.name || conv.mode}</span>
            </div>
        </div>
    `).join('');
}

window.loadConversation = function(id) {
    const conv = allConversations.find(c => c.id === id);
    if (!conv) return;
    conversationHistory = conv.history;
    localStorage.setItem('rabi3_current_history', JSON.stringify(conversationHistory));
    messagesContainer.innerHTML = '';
    for (const msg of conversationHistory) {
        addMessage(msg.content, msg.role === 'user');
    }
    historyPanel.classList.remove('open');
    addMessage(`💾 تم استرجاع محادثة ${conv.title}`, false);
};

function clearChat() {
    if (confirm('هل أنت متأكد من مسح المحادثة الحالية؟')) {
        conversationHistory = [];
        localStorage.removeItem('rabi3_current_history');
        messagesContainer.innerHTML = '';
        addMessage('🗑️ تم مسح المحادثة! ابدأ محادثة جديدة.', false);
        addMessage(`مرحباً! أنا RABI3 AI. اختر النموذج والوضع المناسب.`, false);
    }
}

clearHistoryBtn.addEventListener('click', clearChat);

// ========== أوضاع المحادثة ==========
document.querySelectorAll('.mode-btn').forEach(btn => {
    if (btn.dataset && btn.dataset.mode) {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            addMessage(`🔄 تم التبديل إلى وضع "${modePrompts[currentMode].name}"`, false);
        });
    }
});

// ========== رفع الملفات (صور وملفات) ==========
fileBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    if (file.size > 5 * 1024 * 1024) {
        addMessage('⚠️ الملف كبير جداً (حد أقصى 5 ميجابايت)', false);
        return;
    }
    
    const reader = new FileReader();
    reader.onload = async (event) => {
        const fileData = event.target.result;
        if (file.type.startsWith('image/')) {
            addMessage(`📷 أرسل صورة: ${file.name}`, true, fileData);
        } else {
            addMessage(`📎 أرسل ملف: ${file.name}`, true, null, file.name);
        }
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
});

// ========== تسجيل الصوت ==========
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
        mediaRecorder.onstop = () => {
            addMessage('🎙️ رسالة صوتية', true);
            stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        isRecording = true;
        recordingBadge.style.display = 'block';
    } catch(e) {
        addMessage('❌ لا يمكن الوصول إلى الميكروفون. تأكد من الإذن.', false);
    }
}

function stopRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        recordingBadge.style.display = 'none';
    }
}

voiceBtn.addEventListener('click', () => {
    if (isRecording) stopRecording();
    else startRecording();
});

// ========== إرسال الرسالة ==========
async function sendMessage() {
    const message = userInput.value.trim();
    const apiKey = apiKeyInput.value.trim();
    const model = modelSelect.value;

    if (!message) return;
    if (!apiKey) {
        addMessage('⚠️ الرجاء إدخال مفتاح OpenRouter API أولاً!', false);
        return;
    }

    addMessage(message, true);
    userInput.value = '';
    
    conversationHistory.push({ role: "user", content: message });
    localStorage.setItem('rabi3_current_history', JSON.stringify(conversationHistory));
    showTyping();

    currentController = new AbortController();
    
    try {
        const response = await fetch(OPENROUTER_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`,
                'HTTP-Referer': window.location.href,
                'X-Title': 'RABI3 AI'
            },
            body: JSON.stringify({
                model: model,
                messages: [
                    { role: "system", content: modePrompts[currentMode].prompt },
                    ...conversationHistory
                ],
                max_tokens: 1024,
                temperature: modePrompts[currentMode].temp
            }),
            signal: currentController.signal
        });

        const data = await response.json();
        hideTyping();
        currentController = null;

        if (data.error) {
            addMessage(`❌ ${data.error.message || 'خطأ في الاستجابة'}`, false);
        } else {
            const reply = data.choices[0].message.content;
            conversationHistory.push({ role: "assistant", content: reply });
            localStorage.setItem('rabi3_current_history', JSON.stringify(conversationHistory));
            addMessage(reply, false);
            saveConversation();
        }
    } catch (error) {
        hideTyping();
        if (error.name === 'AbortError') {
            addMessage('🛑 تم إلغاء الطلب.', false);
        } else {
            addMessage(`❌ خطأ في الاتصال: ${error.message}`, false);
        }
        currentController = null;
    }
}

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
historyBtn.addEventListener('click', () => historyPanel.classList.add('open'));
closeHistory.addEventListener('click', () => historyPanel.classList.remove('open'));
